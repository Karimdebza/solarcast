<div class="app">
  <header class="header">
    <div class="logo">
      <span class="sun">☀️</span>
      <span>Solar<strong>Cast</strong></span>
    </div>
    <p class="tagline">Prévision de production solaire personnalisée</p>
  </header>

  <main class="main">
    <app-simulator (predict)="onPredict($event)"></app-simulator>

    <div class="loader" *ngIf="loading">
      <div class="spinner"></div>
      <p>Analyse en cours — NASA + Open-Meteo + XGBoost...</p>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <app-dashboard *ngIf="result" [data]="result"></app-dashboard>
  </main>
</div>
