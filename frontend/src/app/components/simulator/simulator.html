<div class="simulator">
  <div class="section-header">
    <p class="label">// configurez votre installation</p>
    <h2>Simulateur Solaire</h2>
  </div>

  <div class="form">
    <div class="field full">
      <label>📍 Localisation</label>
      
      <div class="cities">
        <button
          *ngFor="let city of cities"
          class="city-btn"
          [class.active]="config.latitude === city.lat"
          (click)="selectCity(city)">
          {{ city.name }}
        </button>
      </div>

      <div class="map-container">
        <app-map (locationChanged)="onMapLocationChange($event)"></app-map>
      </div>

      <div class="coords">
        <span><strong>Lat:</strong> {{ config.latitude }}</span>
        <span><strong>Lon:</strong> {{ config.longitude }}</span>
      </div>
    </div>

    <div class="grid-inputs">
      <div class="field">
        <label>⚡ Puissance crête</label>
        <div class="input-group">
          <input type="number" [(ngModel)]="config.power_kwc" step="0.5" />
          <span class="unit">kWc</span>
        </div>
      </div>

      <div class="field">
        <label>📐 Surface panneaux</label>
        <div class="input-group">
          <input type="number" [(ngModel)]="config.surface_m2" />
          <span class="unit">m²</span>
        </div>
      </div>

      <div class="field">
        <label>🧭 Orientation</label>
        <div class="input-group">
          <input type="number" [(ngModel)]="config.orientation" />
          <span class="unit">° (180=Sud)</span>
        </div>
      </div>

      <div class="field">
        <label>📏 Inclinaison</label>
        <div class="input-group">
          <input type="number" [(ngModel)]="config.tilt" />
          <span class="unit">°</span>
        </div>
      </div>

      <div class="field full">
        <label>🔋 Rendement</label>
        <div class="input-group">
          <input type="number" [(ngModel)]="config.efficiency" step="0.01" />
          <span class="unit">(ex: 0.20 = 20%)</span>
        </div>
      </div>
    </div>

    <button class="submit" (click)="onSubmit()">
      ☀️ Lancer la prédiction
    </button>
  </div>
</div>
