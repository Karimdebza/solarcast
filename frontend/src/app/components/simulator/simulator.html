<div class="simulator">
  <div class="section-header">
    <p class="label">// configurez votre installation</p>
    <h2>Simulateur Solaire</h2>
  </div>

  <div class="form">
    <!-- Sélection ville -->
    <div class="field full">
      <label>📍 Localisation</label>
      <div class="cities">
        <button
          *ngFor="let city of cities"
          class="city-btn"
          [class.active]="config.latitude === city.lat"
          (click)="selectCity(city)">
          {{ city.name }}
        </button>
      </div>
      <div class="coords">
        <span>Lat: {{ config.latitude }}</span>
        <span>Lon: {{ config.longitude }}</span>
      </div>
    </div>

    <!-- Puissance -->
    <div class="field">
      <label>⚡ Puissance crête</label>
      <div class="input-group">
        <input type="number" [(ngModel)]="config.power_kwc" min="0.5" max="100" step="0.5" />
        <span class="unit">kWc</span>
      </div>
    </div>

    <!-- Surface -->
    <div class="field">
      <label>📐 Surface panneaux</label>
      <div class="input-group">
        <input type="number" [(ngModel)]="config.surface_m2" min="1" max="500" step="1" />
        <span class="unit">m²</span>
      </div>
    </div>

    <!-- Orientation -->
    <div class="field">
      <label>🧭 Orientation</label>
      <div class="input-group">
        <input type="number" [(ngModel)]="config.orientation" min="0" max="360" step="10" />
        <span class="unit">° (180=Sud)</span>
      </div>
    </div>

    <!-- Inclinaison -->
    <div class="field">
      <label>📏 Inclinaison</label>
      <div class="input-group">
        <input type="number" [(ngModel)]="config.tilt" min="0" max="90" step="5" />
        <span class="unit">°</span>
      </div>
    </div>

    <!-- Rendement -->
    <div class="field">
      <label>🔋 Rendement</label>
      <div class="input-group">
        <input type="number" [(ngModel)]="config.efficiency" min="0.10" max="0.25" step="0.01" />
        <span class="unit">( ex: 0.20 = 20%)</span>
      </div>
    </div>

    <button class="submit" (click)="onSubmit()">
      ☀️ Lancer la prédiction
    </button>
  </div>
</div>
